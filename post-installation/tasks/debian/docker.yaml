---
- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker's GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: "0644"

- name: Convert and install Docker GPG key
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/docker.gpg > {{ keyrings_dir }}/docker.gpg
    chmod a+r {{ keyrings_dir }}/docker.gpg
  args:
    creates: "{{ keyrings_dir }}/docker.gpg"

- name: Remove old and conflicting Docker repository configurations
  ansible.builtin.include_tasks: shared/utils/clean_apt_conflicts.yaml
  vars:
    repo_name: "{{ item }}"
  loop:
    - docker
    - download_docker_com_linux_ubuntu

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by={{ keyrings_dir }}/docker.gpg] https://download.docker.com/linux/ubuntu {{ ubuntu_base_codename }} stable"
    state: present
    filename: docker

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ username }}"
    groups: docker
    append: true

- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ download_dir }}"
    state: directory
    mode: "0755"

- name: Install docker-compose (Cross-platform)
  ansible.builtin.include_tasks: shared/utils/install_github_asset.yaml
  vars:
    github_repo: docker/compose
    github_asset: docker-compose
    type: binary
    excluded_os_filter: "sha256sum"
    architecture_filter: "{{ docker_compose_arch_fallback }}"
